<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EITAN 0.0.1</title>

    <!-- External Libraries -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        <div class="header-controls">
            <div class="dropdown">
                <button class="nav-btn" id="map-options-btn">אפשרויות מפה <i class="fas fa-chevron-down"></i></button>
                <div class="dropdown-content" id="map-options-menu">
                    <label><input type="checkbox" id="layer-weather"> מזג אוויר</label>
                    <label><input type="checkbox" id="layer-flights"> מעקב מטוסים</label>
                    <label><input type="checkbox" id="layer-earthquakes"> מעקב רעידות אדמה</label>
                </div>
            </div>
            <button class="nav-btn" id="channels-btn">ערוצים</button>
            <button class="nav-btn" id="timer-btn">טיימר</button>
        </div>
        <h1 class="logo">EITAN 1.0</h1>
    </div>

    <div id="main-container">
        <div id="side-panel">
            <button id="toggle-side-btn">
                <i class="fas fa-chevron-right"></i>
            </button>
            <div class="panel-header">
                <h2 class="panel-title" id="title">מערכת התרעות</h2>
                <div class="mode-selector">
                    <button class="mode-btn active" title="מצב 1" id="mode-btn-1"><i
                            class="fas fa-shield-alt"></i></button>
                    <button class="mode-btn" title="מצב 2" id="mode-btn-2"><i
                            class="fas fa-exclamation-triangle"></i></button>
                    <button class="mode-btn" title="מצב 3" id="mode-btn-3"><i class="fas fa-newspaper"></i></button>
                    <button class="mode-btn" title="מצב 4" id="mode-btn-4"><i class="fas fa-toggle-on"></i></button>
                </div>
            </div>
            <div id="sideBox">
                <div class="alerts-container" id="alerts-list"></div>
            </div>
        </div>
        <div id="map"></div>

        <!-- Floating Video/Channel Window -->
        <div id="floating-channel-window" class="hidden">
            <div id="floating-channel-header">
                <span class="floating-title">שידור חי - ערוץ כוחות</span>
                <div class="floating-controls">
                    <button id="lock-channel-btn" class="float-btn" title="נעל למרכז"><i
                            class="fas fa-expand"></i></button>
                    <button id="pin-channel-btn" class="float-btn" title="הצמד לפינה"><i
                            class="fas fa-compress-arrows-alt"></i></button>
                    <button id="close-floating-btn" class="float-btn" title="סגור"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div id="floating-channel-body">
                <iframe id="floating-iframe" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <!-- Floating Timer Widget -->
        <div id="floating-timer-widget" class="hidden">
            <div id="timer-header">
                <span class="timer-title">טיימר שהייה</span>
                <button id="close-timer-btn" class="timer-ctrl-btn"><i class="fas fa-times"></i></button>
            </div>
            <div id="timer-display">10:00</div>
            <div id="timer-controls">
                <button id="start-pause-timer-btn" class="timer-action-btn"><i class="fas fa-play"></i> הפעל</button>
                <button id="reset-timer-btn" class="timer-action-btn"><i class="fas fa-undo"></i> איפוס</button>
            </div>
        </div>

        <!-- Personal Alert Popup Overlay -->
        <div id="personal-alert-popup" class="hidden">
            <div class="alert-content">
                <i class="fas fa-exclamation-circle alert-icon-pulse"></i>
                <h2>התראה באזורך!</h2>
                <h3 id="personal-alert-city-name"></h3>
                <p>הכנס למרחב מוגן, טיימר 10 דקות הופעל.</p>
                <button id="close-personal-alert">הבנתי</button>
            </div>
        </div>

        <!-- Channels Bottom Menu -->
        <div id="channels-bottom-menu" class="bottom-menu modest">
            <div class="bottom-menu-header">
                <h3>שידורים חיים</h3>
                <button id="close-channels-btn"><i class="fas fa-times"></i></button>
            </div>
            <div class="bottom-menu-content">
                <button class="channel-btn" data-url="11">11</button>
                <button class="channel-btn" data-url="12">12</button>
                <button class="channel-btn" data-url="13">13</button>
                <button class="channel-btn" data-url="14">14</button>
                <button class="channel-btn" data-url="mamad"><i class="fas fa-bed"></i> ממ"ד</button>
                <button class="channel-btn" id="custom-channel-btn"><i class="fas fa-link"></i> אחר</button>
            </div>
            <div id="custom-channel-input-container" style="display: none; margin-top: 15px; text-align: center;">
                <input type="text" id="custom-channel-input" placeholder="הכנס קישור לשידור..." />
                <button id="play-custom-channel-btn">הפעל</button>
            </div>
        </div>
    </div>

    <!-- Clock moved to bottom left -->
    <div class="camera-info">
        <p class="datetime"></p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="JavaScript/alerts.js"></script>
    <script src="JavaScript/media.js"></script>
    <script src="JavaScript/map.js"></script>
</body>

</html>
